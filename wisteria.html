<!DOCTYPE html>
<html>
<head>
  <title>Wisteria Euphony</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/effect.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="archive-body">

<header class="site-header">
  <p class="access-warning">CLASSIFIED RECORD</p>
  <h1>WISTERIA "THE VIPER"</h1>
  <p class="subtitle">Subject File 001-A — "Wisteria The Viper"</p>
  <div class="header-divider"></div>
</header>

<main class="archive">
     <section class="dossier-card">
            <h2>Identity</h2>
            <p><strong>Alias:</strong> The Viper</p>
            <p><strong>Age:</strong> 31</p>
            <p><strong>Height:</strong> 5'4"</p>
            <p><strong>Weight:</strong> 130 pounds (+200 pounds tail)</p>
            <p><strong>Status:</strong> Active Threat</p>
            <p><strong>Role:</strong> Head of Organization</p>
            <p><strong>Affiliation:</strong> The Viper Pit</p>
        </section>
        <section class="dossier-card">
            <h2>Insignia</h2>
            <img src="Wisteria Insig.png" alt="Wisteria" class="portrait">
        </section>
</main>

<footer>
  <p>END OF ARCHIVE</p>
</footer>

<script>
    const reveals = document.querySelectorAll(".dossier-card, .reveal-quote");

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add("show");
            }
        });
    });

    reveals.forEach(item => observer.observe(item));
</script>

</body>
</html>
